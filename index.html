<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrega de Viandas</title>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; background: #f3f3f3; margin: 0; padding: 20px; }
    .container { max-width: 420px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { background: #00695c; color: #fff; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
    label { font-weight: bold; margin-top: 10px; display: block; }
    input, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
    canvas { border: 1px solid #ccc; border-radius: 6px; width: 100%; height: 150px; margin-top: 5px; }
    .btn { background: #4caf50; color: #fff; border: none; font-weight: bold; margin-top: 15px; font-size: 18px; }
    .registro-box { background: #e0f2f1; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    #mensajeConfirmacion {
      display:none; position:fixed; top:40%; left:50%; transform:translate(-50%, -50%);
      background:#4caf50; color:#fff; padding:20px 30px; border-radius:12px;
      font-size:22px; font-weight:bold; text-align:center; z-index:9999;
    }
    #mensajeConfirmacion .icono {
      display:inline-block; width:40px; height:40px; margin-right:10px;
      border-radius:50%; background:#fff; color:#4caf50; font-size:28px;
      line-height:40px; text-align:center; font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>ENTREGA DE VIANDAS</h2>
    <form id="formRemito">
      <div class="registro-box">
        <label>Fecha y hora de registro</label>
        <input type="text" id="registro" readonly>
      </div>
      <label>Lugar de entrega de viandas</label>
      <input type="text" id="lugar" required>
      <label>Cantidad de viandas</label>
      <input type="number" id="viandas" required>
      <label>Cantidad de tickets/vales</label>
      <input type="number" id="tickets" required>
      <label>Hora de entrega</label>
      <input type="time" id="horaEntrega" required>
      <label>Nombre del personal que entrega</label>
      <input type="text" id="personal" required>
      <label>Firma del destinatario</label>
      <canvas id="firma"></canvas>
      <button type="button" id="limpiar">Limpiar firma</button>
      <label>Aclaración del destinatario (apellido)</label>
      <input type="text" id="aclaracion" required>
      <button type="submit" class="btn">ENVIAR</button>
    </form>
    <div id="mensajeConfirmacion">
      <span class="icono">✓</span> MENSAJE ENVIADO
    </div>
  </div>

  <script>
    const canvas = document.getElementById('firma');
    const signaturePad = new SignaturePad(canvas);
    document.getElementById('limpiar').addEventListener('click', () => signaturePad.clear());

    // Fecha y hora automáticas
    function setRegistro() {
      const ahora = new Date();
      const fecha = ahora.toLocaleDateString('es-AR');
      const hora = ahora.toTimeString().slice(0,5);
      document.getElementById('registro').value = `${fecha} - ${hora}`;
    }
    setRegistro();

    document.getElementById('formRemito').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (signaturePad.isEmpty()) {
        alert('Por favor, firme antes de continuar.');
        return;
      }

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      pdf.text('Entrega de Viandas', 10, 10);
      pdf.text(`Fecha y hora de registro: ${registro.value}`, 10, 20);
      pdf.text(`Lugar de entrega: ${lugar.value}`, 10, 30);
      pdf.text(`Viandas: ${viandas.value}`, 10, 40);
      pdf.text(`Tickets/Vales: ${tickets.value}`, 10, 50);
      pdf.text(`Hora de entrega: ${horaEntrega.value}`, 10, 60);
      pdf.text(`Personal que entrega: ${personal.value}`, 10, 70);
      pdf.text(`Aclaración del destinatario: ${aclaracion.value}`, 10, 80);
      const firmaImg = signaturePad.toDataURL();
      pdf.addImage(firmaImg, 'PNG', 10, 90, 60, 30);

      const pdfBase64 = pdf.output('datauristring');

      // Enviar al script de Google Apps Script
      await fetch('https://script.google.com/macros/s/AKfycbxsplwnZGzSpskLZ5dOmzxdnmJMEArZ3nzsof89h6TflpvYlm7Rrg3h9U62w9Wts2Pb/exec', {
        method: 'POST',
        body: JSON.stringify({
          file: pdfBase64,
          lugar: lugar.value
        })
      });

      // Mostrar mensaje en el centro de la pantalla
      const mensaje = document.getElementById('mensajeConfirmacion');
      mensaje.style.display = 'block';

      // Limpiar formulario y firma
      document.getElementById('formRemito').reset();
      signaturePad.clear();
      setRegistro();

      // Ocultar mensaje y cerrar app después de 3 segundos
      setTimeout(() => {
        mensaje.style.display = 'none';
        window.close(); // Cierra la ventana/app en navegadores que lo permitan
      }, 3000);
    });
  </script>
</body>
</html>
